<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>울산항 안전 통합 관제 (Admin v10)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: #000; height: 100vh; overflow: hidden; }
        .header { background: #002244; color: white; padding: 15px; text-align: center; z-index: 1001; position: relative; font-weight: bold; }
        #map-container { position: absolute; top: 55px; left: 0; width: 100%; height: calc(100% - 55px); z-index: 10; background: white; }
        #map { width: 100%; height: 100%; }
        #ar-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; visibility: hidden; }
        .btn-group { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1002; display: flex; gap: 10px; width: 90%; max-width: 450px; }
        button { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-map { background: #007bff; }
        .btn-ar { background: #ff4757; }
        #status-label { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(0,0,0,0.8); color: white; padding: 6px 18px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">⚓ 울산항 안전 통합 관제 (Admin)</div>
    <div id="status-label">현재 모드: 🗺️ 실시간 지도</div>

    <div id="map-container"><div id="map">지도를 불러오는 중입니다...</div></div>
    <div id="ar-container">
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
            <a-entity id="ar-markers"></a-entity>
            <a-camera gps-camera rotation-reader></a-camera>
        </a-scene>
    </div>

    <div class="btn-group">
        <button class="btn-map" onclick="switchToMap()">🗺️ 지도 보기</button>
        <button class="btn-ar" onclick="switchToAR()">🚀 AR 현장 스캔</button>
    </div>

    <script>
        // 1. Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyASI2ED_G48LjDzH5-P_ahzDEPhDEpCLP4",
            authDomain: "ulsan-safety-ar.firebaseapp.com",
            databaseURL: "https://ulsan-safety-ar-default-rtdb.firebaseio.com",
            projectId: "ulsan-safety-ar",
            storageBucket: "ulsan-safety-ar.firebasestorage.app",
            messagingSenderId: "1025974157267",
            appId: "1:1025974157267:web:677b9d7550f495e5e1b926"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map;
        let infoWindow;
        const markers = {}; // 이미 생성된 마커 관리용

        function initMap() {
            // 초기 위치는 울산항 중심
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 35.5012, lng: 129.3789 },
                zoom: 14,
                disableDefaultUI: false
            });

            infoWindow = new google.maps.InfoWindow();

            // 데이터 실시간 감시 (safety_reports 방)
            database.ref('safety_reports').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    console.log("데이터 수신됨:", data);
                    updateMarkers(data);
                }
            });
        }

        function updateMarkers(data) {
            const arMarkersContainer = document.getElementById('ar-markers');
            arMarkersContainer.innerHTML = ''; // AR 마커는 갱신
            let latestPos = null;

            for (let key in data) {
                const report = data[key];
                const lat = parseFloat(report.lat);
                const lng = parseFloat(report.lng);
                
                if (isNaN(lat) || isNaN(lng)) continue;
                latestPos = { lat, lng };

                // [지도 마커] 기존에 없는 마커만 새로 생성
                if (!markers[key]) {
                    const marker = new google.maps.Marker({
                        position: latestPos,
                        map: map,
                        title: report.description || "위험 제보",
                        icon: "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
                    });

                    marker.addListener("click", () => {
                        const content = `
                            <div style="padding:10px; color:#333; min-width:150px;">
                                <strong style="color:#d9534f;">⚠️ 위험 제보</strong><br>
                                <p style="margin:5px 0; font-size:14px;">${report.description || '내용 없음'}</p>
                                <hr style="border:0.5px solid #eee;">
                                <small style="color:#888;">⏰ ${report.timestamp || ''}</small>
                            </div>`;
                        infoWindow.setContent(content);
                        infoWindow.open(map, marker);
                    });
                    markers[key] = marker;
                }

                // [AR 마커] AR 모드용 3D 구체 생성
                const arEntity = document.createElement('a-entity');
                arEntity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
                arEntity.setAttribute('geometry', 'primitive: sphere; radius: 5');
                arEntity.setAttribute('material', 'color: #ff4757; opacity: 0.9; shader: flat');
                arMarkersContainer.appendChild(arEntity);
            }

            // 마지막 제보 위치로 지도 중심 이동 (부산 테스트 시 유용)
            if (latestPos) {
                map.panTo(latestPos);
            }
        }

        function switchToMap() {
            document.getElementById('map-container').style.visibility = 'visible';
            document.getElementById('ar-container').style.visibility = 'hidden';
            document.getElementById('status-label').innerText = "현재 모드: 🗺️ 실시간 지도";
        }

        function switchToAR() {
            document.getElementById('map-container').style.visibility = 'hidden';
            document.getElementById('ar-container').style.visibility = 'visible';
            document.getElementById('status-label').innerText = "현재 모드: 🚀 AR 현장 스캔 중";
            // AR 엔진 리프레시를 위해 화면 크기 재조정 이벤트 발생
            window.dispatchEvent(new Event('resize'));
        }

        // 구글 맵 API 로드
        const gKey = "AIzaSyDxW1MSwOsEMsWuyEUicFzms6ybX0Ff8To";
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${gKey}&callback=initMap`;
        script.defer = true;
        document.head.appendChild(script);
    </script>
</body>
</html>
