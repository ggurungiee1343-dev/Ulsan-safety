<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>울산항 안전 통합 관제 (Admin v11)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        /* 화면 전체 설정 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: #000; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 상단 헤더 */
        .header { background: #002244; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 16px; flex-shrink: 0; z-index: 2000; }
        
        /* 지도/AR 영역: 헤더와 버튼 사이를 꽉 채움 */
        #content-area { position: relative; flex-grow: 1; width: 100%; overflow: hidden; }
        
        #map-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: white; }
        #map { width: 100%; height: 100%; }
        
        #ar-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; visibility: hidden; }

        /* 하단 버튼 영역: 무조건 최상단에 보이도록 설정 */
        .btn-group { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 5000; /* 지도를 확실히 이기도록 설정 */
            display: flex; 
            gap: 12px; 
            width: 90%; 
            max-width: 400px; 
        }
        
        button { 
            flex: 1; 
            padding: 16px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            font-size: 15px; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            -webkit-appearance: none; /* 아이폰 스타일 방지 */
        }
        .btn-map { background: #007bff; }
        .btn-ar { background: #ff4757; }
        
        #status-label { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(0,0,0,0.7); color: white; padding: 4px 15px; border-radius: 20px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">⚓ 울산항 안전 통합 관제 (Admin)</div>
    <div id="status-label">현재 모드: 🗺️ 실시간 지도</div>

    <div id="content-area">
        <div id="map-container"><div id="map">지도를 불러오는 중입니다...</div></div>
        
        <div id="ar-container">
            <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
                <a-entity id="ar-markers"></a-entity>
                <a-camera gps-camera rotation-reader></a-camera>
            </a-scene>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-map" onclick="switchToMap()">🗺️ 지도 보기</button>
        <button class="btn-ar" onclick="switchToAR()">🚀 AR 현장 스캔</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASI2ED_G48LjDzH5-P_ahzDEPhDEpCLP4",
            authDomain: "ulsan-safety-ar.firebaseapp.com",
            databaseURL: "https://ulsan-safety-ar-default-rtdb.firebaseio.com",
            projectId: "ulsan-safety-ar",
            storageBucket: "ulsan-safety-ar.firebasestorage.app",
            messagingSenderId: "1025974157267",
            appId: "1:1025974157267:web:677b9d7550f495e5e1b926"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map;
        let infoWindow;
        const markers = {};

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 35.5012, lng: 129.3789 },
                zoom: 14,
                disableDefaultUI: true, // 버튼 공간 확보를 위해 UI 숨김
                zoomControl: true
            });
            infoWindow = new google.maps.InfoWindow();
            database.ref('safety_reports').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) updateMarkers(data);
            });
        }

        function updateMarkers(data) {
            const arContainer = document.getElementById('ar-markers');
            arContainer.innerHTML = '';
            let latestPos = null;

            for (let key in data) {
                const report = data[key];
                const lat = parseFloat(report.lat);
                const lng = parseFloat(report.lng);
                if (isNaN(lat) || isNaN(lng)) continue;
                latestPos = { lat, lng };

                if (!markers[key]) {
