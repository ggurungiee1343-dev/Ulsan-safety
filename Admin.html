<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>울산항 안전 관리자 - AR 관제</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* 지도 레이어 */
        #map-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: white; }
        /* AR 레이어 (기본은 숨김) */
        #ar-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; visibility: hidden; }
        /* 상단 모드 표시 바 */
        .status-bar { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        /* 하단 버튼 */
        .btn-group { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 10px; width: 90%; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn-map { background: #007bff; color: white; }
        .btn-ar { background: #ff4757; color: white; }
    </style>
</head>
<body>

    <div id="status" class="status-bar">현재 모드: 🗺️ 2D 지도</div>

    <div id="map-container">
        <div style="padding: 20px; text-align: center;">
            <h3>울산항 안전 관리자 지도</h3>
            <p>여기에 기존 지도가 표시됩니다.</p>
        </div>
    </div>

    <div id="ar-container">
        <a-scene embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" vr-mode-ui="enabled: false">
            <a-entity id="hazard-marker" 
                      gps-entity-place="latitude: 35.5012; longitude: 129.3789;" 
                      geometry="primitive: box; width: 2; height: 2; depth: 2" 
                      material="color: red;"
                      scale="5 5 5">
                <a-text value="위험 지역" align="center" position="0 2 0" scale="10 10 10" color="white"></a-text>
            </a-entity>
            <a-camera gps-camera rotation-reader></a-camera>
        </a-scene>
    </div>

    <div class="btn-group">
        <button class="btn-map" onclick="switchToMap()">🗺️ 지도 보기</button>
        <button class="btn-ar" onclick="switchToAR()">🚀 AR 스캔</button>
    </div>

    <script>
        function switchToMap() {
            document.getElementById('map-container').style.visibility = 'visible';
            document.getElementById('ar-container').style.visibility = 'hidden';
            document.getElementById('status').innerText = "현재 모드: 🗺️ 2D 지도";
        }

        function switchToAR() {
            // 카메라 권한을 명시적으로 확인하기 위해 보류 레이어 변경
            document.getElementById('map-container').style.visibility = 'hidden';
            document.getElementById('ar-container').style.visibility = 'visible';
            document.getElementById('status').innerText = "현재 모드: 🚀 AR 스캔 중";
            
            // 카메라 작동을 위해 씬에 리사이즈 이벤트 트리거
            window.dispatchEvent(new Event('resize'));
        }
    </script>
</body>
</html>
