<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>울산항 안전 관리 (Admin v5)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: #000; height: 100vh; overflow: hidden; }
        .header { background: #002244; color: white; padding: 15px; text-align: center; z-index: 1001; position: relative; font-weight: bold; }
        
        /* 레이어: 지도(높음) / AR(낮음) */
        #map-container { position: absolute; top: 55px; left: 0; width: 100%; height: calc(100% - 55px); z-index: 10; background: white; visibility: visible; }
        #map { width: 100%; height: 100%; }
        
        #ar-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; visibility: hidden; }

        /* 하단 버튼 */
        .btn-group { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1002; display: flex; gap: 10px; width: 90%; max-width: 450px; }
        button { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-map { background: #007bff; }
        .btn-ar { background: #ff4757; }
        
        #status-label { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(0,0,0,0.8); color: white; padding: 6px 18px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">⚓ 울산항 안전 통합 관제 (Admin)</div>
    <div id="status-label">현재 모드: 🗺️ 실시간 지도</div>

    <div id="map-container">
        <div id="map">지도를 불러오는 중입니다...</div>
    </div>

    <div id="ar-container">
        <a-scene embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" vr-mode-ui="enabled: false">
            <a-entity id="ar-markers"></a-entity>
            <a-camera gps-camera rotation-reader></a-camera>
        </a-scene>
    </div>

    <div class="btn-group">
        <button class="btn-map" onclick="switchToMap()">🗺️ 지도 보기</button>
        <button class="btn-ar" onclick="switchToAR()">🚀 AR 현장 스캔</button>
    </div>

    <script>
        // 1. Firebase 설정 (고정)
        const firebaseConfig = {
            apiKey: "AIzaSyASI2ED_G48LjDzH5-P_ahzDEPhDEpCLP4",
            authDomain: "ulsan-safety-ar.firebaseapp.com",
            databaseURL: "https://ulsan-safety-ar-default-rtdb.firebaseio.com",
            projectId: "ulsan-safety-ar",
            storageBucket: "ulsan-safety-ar.firebasestorage.app",
            messagingSenderId: "1025974157267",
            appId: "1:1025974157267:web:677b9d7550"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        let map;
        const markers = {};

        // 2. 지도 초기화 및 실시간 동기화
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 35.5012, lng: 129.3789 },
                zoom: 15,
                disableDefaultUI: false
            });

            // Firebase에서 제보 데이터 감시
            database.ref('reports').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) updateSystem(data);
            });
        }

        function updateSystem(data) {
            const arScene = document.getElementById('ar-markers');
            arScene.innerHTML = ''; 
            let lastPos = null;

            for (let id in data) {
                const report = data[id];
                const lat = parseFloat(report.lat);
                const lng = parseFloat(report.lng);

                if (isNaN(lat) || isNaN(lng)) continue;
                lastPos = { lat: lat, lng: lng };

                // [지도 마커] 기존 마커 없으면 생성
                if (!markers[id]) {
                    markers[id] = new google.maps.Marker({
                        position: { lat: lat, lng: lng },
                        map: map,
                        title: report.type,
                        animation: google.maps.Animation.DROP
                    });
                }

                // [AR 마커] 3D 공간에 빨간 구체 생성
                const arMarker = document.createElement('a-entity');
                arMarker.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
                arMarker.setAttribute('geometry', 'primitive: sphere; radius: 3');
                arMarker.setAttribute('material', 'color: red; opacity: 0.8');
                
                const text = document.createElement('a-text');
                text.setAttribute('value', report.type || '위험');
                text.setAttribute('align', 'center');
                text.setAttribute('scale', '40 40 40');
                text.setAttribute('position', '0 8 0');
                
                arMarker.appendChild(text);
                arScene.appendChild(arMarker);
            }

            // [부산 테스트 대응] 마지막 제보 위치로 지도를 강제 이동
            if (lastPos) {
                map.setCenter(lastPos);
            }
        }

        // 3. 모드 전환 함수
        function switchToMap() {
            document.getElementById('map-container').style.visibility = 'visible';
            document.getElementById('ar-container').style.visibility = 'hidden';
            document.getElementById('status-label').innerText = "현재 모드: 🗺️ 실시간 지도";
        }

        function switchToAR() {
            document.getElementById('map-container').style.visibility = 'hidden';
            document.getElementById('ar-container').style.visibility = 'visible';
            document.getElementById('status-label').innerText = "현재 모드: 🚀 AR 현장 스캔 중";
            window.dispatchEvent(new Event('resize'));
        }

        // 구글 맵 로드 (도선사님 키)
        const gKey = "AIzaSyASI2ED_G48LjDzH5-P_ahzDEPhDEpCLP4";
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${gKey}&callback=initMap`;
        script.defer = true;
        document.head.appendChild(script);
    </script>
</body>
</html>
