<script>
    // 구글 맵 API 로드 함수 (위치 이동 및 단순화)
    function loadGoogleMaps() {
        const script = document.createElement('script');
        // 도선사님 API 키 직접 삽입
        script.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyASI2ED_G48LjDzH5-P_ahzDEPhDEpCLP4&callback=initMap";
        script.defer = true;
        script.async = true;
        script.onerror = () => {
            alert("구글 지도 로드 실패! API 키나 결제 설정을 확인하세요.");
        };
        document.head.appendChild(script);
    }

    // 페이지 로드 시 실행
    window.onload = loadGoogleMaps;

    function initMap() {
        console.log("지도 초기화 시작");
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 35.5012, lng: 129.3789 },
            zoom: 14,
            disableDefaultUI: false // UI 일단 모두 켜서 확인
        });
        // Firebase 연결 (이하 동일)
        database.ref('reports').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) updateUI(data);
        });
    }
</script>
