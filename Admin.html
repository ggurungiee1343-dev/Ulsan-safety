<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>울산항 안전 관제 (Admin v16)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: white; }
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: #002244; color: white; line-height: 50px; text-align: center; font-weight: bold; z-index: 5000; }
        
        /* 지도: 기본 바탕 */
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 100; }
        
        /* AR: 지도 위에 덮어씌우는 형태 */
        #ar-container { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            z-index: 10; visibility: hidden; pointer-events: none;
        }

        .btn-group { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; display: flex; gap: 10px; z-index: 6000; }
        button { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .btn-map { background: #007bff; }
        .btn-ar { background: #ff4757; }
        
        #status-label { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(40, 167, 69, 0.9); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; z-index: 5000; }
        
        /* AR 엔진 캔버스 강제 조정 */
        .a-canvas { position: absolute !important; top: 0; left: 0; z-index: 1 !important; }
        video { position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; object-fit: cover !important; z-index: 0 !important; }
    </style>
</head>
<body>
    <div class="header">⚓ 울산항 안전 통합 관제 (Admin)</div>
    <div id="status-label">🗺️ 지도를 불러오는 중...</div>

    <div id="map"></div>
    
    <div id="ar-container">
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
            <a-entity id="ar-markers"></a-entity>
            <a-camera gps-camera rotation-reader></a-camera>
        </a-scene>
    </div>

    <div class="btn-group">
        <button class="btn-map" onclick="switchToMap()">🗺️ 지도 보기</button>
        <button class="btn-ar" onclick="switchToAR()">🚀 AR 현장 스캔</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASI2ED_G48LjDzH5-P_ahzDEPhDEpCLP4",
            authDomain: "ulsan-safety-ar.firebaseapp.com",
            databaseURL: "https://ulsan-safety-ar-default-rtdb.firebaseio.com",
            projectId: "ulsan-safety-ar",
            storageBucket: "ulsan-safety-ar.firebasestorage.app",
            messagingSenderId: "1025974157267",
            appId: "1:1025974157267:web:677b9d7550f495e5e1b926"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map;
        const markers = {};

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 35.5012, lng: 129.3789 },
                zoom: 13,
                disableDefaultUI: false
            });

            database.ref('safety_reports').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById("status-label").innerText = `✅ 수신 성공: 제보 ${Object.keys(data).length}건`;
                    updateMarkers(data);
                }
            });
        }

        function updateMarkers(data) {
            const arContainer = document.getElementById('ar-markers');
            arContainer.innerHTML = ''; 
            for (let key in data) {
                const report = data[key];
                const lat = parseFloat(report.lat);
                const lng = parseFloat(report.lng);
                if (isNaN(lat) || isNaN(lng)) continue;

                if (!markers[key]) {
                    markers[key] = new google.maps.Marker({ position: {lat, lng}, map: map });
                }

                const arEntity = document.createElement('a-entity');
                arEntity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
                arEntity.setAttribute('geometry', 'primitive: sphere; radius: 10'); 
                arEntity.setAttribute('material', 'color: #ff4757; shader: flat;');
                arContainer.appendChild(arEntity);
            }
        }

        function switchToMap() {
            document.getElementById('map').style.zIndex = 100;
            document.getElementById('ar-container').style.visibility = 'hidden';
            document.getElementById('ar-container').style.pointerEvents = 'none';
        }

        function switchToAR() {
            // 지도 뒤로 완전히 밀기
            document.getElementById('map').style.zIndex = 1;
            
            // AR 앞으로 당기고 활성화
            const arCont = document.getElementById('ar-container');
            arCont.style.visibility = 'visible';
            arCont.style.zIndex = 500;
            arCont.style.pointerEvents = 'auto';

            // 카메라 엔진 깨우기 (매우 중요)
            window.dispatchEvent(new Event('resize'));
            setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
        }

        const gKey = "AIzaSyDxW1MSwOsEMsWuyEUicFzms6ybX0Ff8To";
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${gKey}&callback=initMap`;
        script.defer = true;
        document.head.appendChild(script);
    </script>
</body>
</html>
