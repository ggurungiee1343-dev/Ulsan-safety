<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>울산항 안전 관제 (Admin v13)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .header { position: absolute; top: 0; left: 0; width: 100%; height: 50px; background: rgba(0, 34, 68, 0.95); color: white; line-height: 50px; text-align: center; font-weight: bold; z-index: 2000; }
        #main-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 10; }
        #ar-container { width: 100%; height: 100%; position: absolute; z-index: 5; visibility: hidden; }
        .btn-group { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; display: flex; gap: 10px; z-index: 5000; }
        button { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; }
        .btn-map { background: #007bff; }
        .btn-ar { background: #ff4757; }
        /* 디버깅용 상태 라벨 */
        #status-label { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(217, 83, 79, 0.9); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; z-index: 2000; }
    </style>
</head>
<body>
    <div class="header">⚓ 울산항 안전 통합 관제 (Admin)</div>
    <div id="status-label">데이터 연결 중...</div>

    <div id="main-view">
        <div id="map"></div>
        <div id="ar-container">
            <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
                <a-entity id="ar-markers"></a-entity>
                <a-camera gps-camera rotation-reader></a-camera>
            </a-scene>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-map" onclick="switchToMap()">🗺️ 지도 보기</button>
        <button class="btn-ar" onclick="switchToAR()">🚀 AR 현장 스캔</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASI2ED_G48LjDzH5-P_ahzDEPhDEpCLP4",
            authDomain: "ulsan-safety-ar.firebaseapp.com",
            databaseURL: "https://ulsan-safety-ar-default-rtdb.firebaseio.com",
            projectId: "ulsan-safety-ar",
            storageBucket: "ulsan-safety-ar.firebasestorage.app",
            messagingSenderId: "1025974157267",
            appId: "1:1025974157267:web:677b9d7550f495e5e1b926"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map;
        let infoWindow;
        const markers = {};

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 35.5012, lng: 129.3789 },
                zoom: 13,
                disableDefaultUI: false
            });
            infoWindow = new google.maps.InfoWindow();

            // Firebase 데이터 로드 시도 및 상태 표시
            const reportsRef = database.ref('safety_reports');
            reportsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const statusLabel = document.getElementById("status-label");
                
                if (data) {
                    const count = Object.keys(data).length;
                    statusLabel.innerText = `✅ 수신 성공: 제보 ${count}건`;
                    statusLabel.style.background = "rgba(40, 167, 69, 0.9)";
                    updateMarkers(data);
                } else {
                    statusLabel.innerText = "⚠️ 수신된 제보 데이터가 없습니다.";
                }
            }, (error) => {
                document.getElementById("status-label").innerText = "❌ DB 연결 오류 발생";
                console.error(error);
            });
        }

        function updateMarkers(data) {
            const arContainer = document.getElementById('ar-markers');
            arContainer.innerHTML = '';
            let latestPos = null;

            for (let key in data) {
                const report = data[key];
                // Index.html과 동일하게 lat, lng 필드 사용
                const lat = parseFloat(report.lat);
                const lng = parseFloat(report.lng);
                
                if (isNaN(lat) || isNaN(lng)) continue;
                latestPos = { lat, lng };

                if (!markers[key]) {
                    const marker = new google.maps.Marker({
                        position: latestPos,
                        map: map,
                        animation: google.maps.Animation.DROP,
                        title: report.description || "제보"
                    });
                    
                    marker.addListener("click", () => {
                        const content = `<div style="padding:10px; color:#333;">
                            <strong>⚠️ 위험 제보</strong><br>${report.description || '내용 없음'}<br>
                            <small style="color:#888;">⏰ ${report.timestamp || ''}</small></div>`;
                        infoWindow.setContent(content);
                        infoWindow.open(map, marker);
                    });
                    markers[key] = marker;
                }

                // AR 마커 생성
                const arEntity = document.createElement('a-entity');
                arEntity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
                arEntity.setAttribute('geometry', 'primitive: sphere; radius: 5');
                arEntity.setAttribute('material', 'color: #ff4757; opacity: 0.9; shader: flat');
                arContainer.appendChild(arEntity);
            }
            
            // 데이터가 들어오면 해당 위치로 자동 이동
            if (latestPos) {
                map.setCenter(latestPos);
            }
        }

        function switchToMap() {
            document.getElementById('map').style.zIndex = 10;
            document.getElementById('ar-container').style.visibility = 'hidden';
        }

        function switchToAR() {
            document.getElementById('map').style.zIndex = 1;
            document.getElementById('ar-container').style.visibility = 'visible';
            window.dispatchEvent(new Event('resize'));
        }

        const gKey = "AIzaSyDxW1MSwOsEMsWuyEUicFzms6ybX0Ff8To";
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${gKey}&callback=initMap`;
        script.defer = true;
        document.head.appendChild(script);
    </script>
</body>
</html>
