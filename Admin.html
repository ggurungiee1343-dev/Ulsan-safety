<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>울산항 안전 관제 (Admin v17)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif; }
        
        /* 헤더: 클릭 방해 금지 설정 */
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: #002244; color: white; line-height: 50px; text-align: center; font-weight: bold; z-index: 5000; pointer-events: none; }
        
        /* 상태 라벨: pointer-events: none으로 설정하여 뒤쪽 클릭 가능하게 함 */
        #status-label { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(40, 167, 69, 0.9); color: white; padding: 6px 16px; border-radius: 20px; font-size: 12px; z-index: 4500; pointer-events: none; white-space: nowrap; }

        /* 지도 영역 */
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; }
        
        /* AR 영역 */
        #ar-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 5; visibility: hidden; }

        /* 하단 버튼 그룹: 최상단 배치 */
        .btn-group { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; display: flex; gap: 10px; z-index: 9999; }
        button { flex: 1; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; }
        .btn-map { background: #007bff; }
        .btn-ar { background: #ff4757; }
        
        /* AR 모드 시 비디오 우선순위 강제 조정 */
        video { position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; object-fit: cover !important; z-index: -1 !important; }
    </style>
</head>
<body>
    <div class="header">⚓ 울산항 안전 통합 관제 (Admin)</div>
    <div id="status-label">🗺️ 지도를 불러오는 중...</div>

    <div id="map"></div>
    
    <div id="ar-container">
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
            <a-entity id="ar-markers"></a-entity>
            <a-camera gps-camera rotation-reader></a-camera>
        </a-scene>
    </div>

    <div class="btn-group">
        <button class="btn-map" onclick="switchToMap()">🗺️ 지도 보기</button>
        <button class="btn-ar" onclick="switchToAR()">🚀 AR 현장 스캔</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASI2ED_G48LjDzH5-P_ahzDEPhDEpCLP4",
            authDomain: "ulsan-safety-ar.firebaseapp.com",
            databaseURL: "https://ulsan-safety-ar-default-rtdb.firebaseio.com",
            projectId: "ulsan-safety-ar",
            storageBucket: "ulsan-safety-ar.firebasestorage.app",
            messagingSenderId: "1025974157267",
            appId: "1:1025974157267:web:677b9d7550f495e5e1b926"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let map;
        let infoWindow;
        const markers = {};

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 35.5012, lng: 129.3789 },
                zoom: 13,
                disableDefaultUI: false,
                clickableIcons: true // 아이콘 클릭 활성화
            });
            infoWindow = new google.maps.InfoWindow();

            database.ref('safety_reports').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById("status-label").innerText = `✅ 수신 성공: 제보 ${Object.keys(data).length}건`;
                    updateMarkers(data);
                }
            });
        }

        function updateMarkers(data) {
            const arContainer = document.getElementById('ar-markers');
            arContainer.innerHTML = ''; 
            for (let key in data) {
                const report = data[key];
                const lat = parseFloat(report.lat);
                const lng = parseFloat(report.lng);
                if (isNaN(lat) || isNaN(lng)) continue;

                if (!markers[key]) {
                    const marker = new google.maps.Marker({ position: {lat, lng}, map: map });
                    marker.addListener("click", () => {
                        infoWindow.setContent(`<div style="padding:10px; color:black;"><strong>⚠️ 제보 내용</strong><br>${report.description || '내용 없음'}</div>`);
                        infoWindow.open(map, marker);
                    });
                    markers[key] = marker;
                }

                const arEntity = document.createElement('a-entity');
                arEntity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng};`);
                arEntity.setAttribute('geometry', 'primitive: box; width: 10; height: 10; depth: 10'); 
                arEntity.setAttribute('material', 'color: #ff4757; shader: flat; opacity: 0.8');
                arContainer.appendChild(arEntity);
            }
        }

        function switchToMap() {
            document.getElementById('map').style.zIndex = 10;
            document.getElementById('ar-container').style.visibility = 'hidden';
            document.getElementById('status-label').style.background = "rgba(40, 167, 69, 0.9)";
        }

        function switchToAR() {
            // 지도와 버튼 간섭 제거
            document.getElementById('map').style.zIndex = 1;
            const arCont = document.getElementById('ar-container');
            arCont.style.visibility = 'visible';
            arCont.style.zIndex = 100;

            document.getElementById('status-label').innerText = "🚀 AR 스캔 모드 가동 중";
            document.getElementById('status-label').style.background = "rgba(255, 71, 87, 0.9)";

            // 엔진 강제 리사이즈
            setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 200);
        }

        const gKey = "AIzaSyDxW1MSwOsEMsWuyEUicFzms6ybX0Ff8To";
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${gKey}&callback=initMap`;
        script.defer = true;
        document.head.appendChild(script);
    </script>
</body>
</html>
